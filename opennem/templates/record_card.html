<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green:    #2EC42B;
    --red:      #F25151;

    --text-primary:   #000000;
    --text-secondary: #353535;
    --text-tertiary:  #6A6A6A;

    --surface-bg:   #FAF9F6;
    --tile-bg:      #FFFFFF;
    --row-border:   #F1F0ED;
    --record-bg:    #F4F2EB;
  }

  body {
    width: 1200px;
    height: 630px;
    background: var(--surface-bg);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .card {
    height: 100%;
    padding: 40px 56px 28px;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    margin-bottom: 22px;
  }
  .header-left {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-top: 4px;
  }
  .ft-badge {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ft-badge svg { width: 32px; height: 32px; }

  .record-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 40px;
    font-weight: 600;
    line-height: 46px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .record-region {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .header-right {
    flex-shrink: 0;
    background: var(--record-bg);
    border-radius: 12px;
    padding: 18px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 260px;
    border: 1px solid var(--row-border);
  }
  .record-set-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .record-set-dot {
    width: 14px;
    height: 14px;
    background: black;
    border: 3px solid white;
    border-radius: 50%;
    box-shadow: 0 0 0 1px var(--text-tertiary);
  }
  .record-set-date {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .record-value-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-top: 6px;
  }
  .record-value {
    font-family: 'DM Mono', monospace;
    font-size: 50px;
    font-weight: 500;
    line-height: 54px;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .record-unit {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-tertiary);
  }
  .record-change {
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .record-change.up   { color: var(--green); }
  .record-change.down { color: var(--red); }

  /* ---- Sparkline ---- */
  .sparkline-wrap {
    height: 180px;
    background: var(--tile-bg);
    border-radius: 12px;
    padding: 18px 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 1px solid var(--row-border);
  }
  .sparkline-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .sparkline-svg {
    flex: 1 1 auto;
    width: 100%;
    display: block;
  }

  /* ---- Footer ---- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--row-border);
    flex-shrink: 0;
  }
  .footer-source {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-tertiary);
  }
  .footer-logo {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    color: var(--text-primary);
  }
  .footer-logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .footer-logo-mark { width: 16px; height: 8px; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="ft-badge" style="background-color: ${ft_color}; color: ${icon_color};">
        ${icon_svg}
      </div>
      <div>
        <div class="record-title">${title}</div>
        % if region:
        <div class="record-region">${region}</div>
        % endif
      </div>
    </div>

    <div class="header-right">
      <div class="record-set-label">
        <span class="record-set-dot"></span>
        Record set
      </div>
      <div class="record-set-date">${set_date}</div>
      <div class="record-value-row">
        <span class="record-value">${value_str}</span>
        % if unit_str:
        <span class="record-unit">${unit_str}</span>
        % endif
      </div>
      % if change_str:
      <div class="record-change ${change_class}">${change_str}</div>
      % endif
    </div>
  </div>

  <!-- Sparkline -->
  <div class="sparkline-wrap">
    <div class="sparkline-meta">
      <span>${history_label}</span>
      <span>${period_label}</span>
    </div>
    ${sparkline_svg}
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-source">Source: AEMO / Open Electricity</span>
    <div class="footer-logo">
      <span class="footer-logo-text">Open Electricity</span>
      <svg class="footer-logo-mark" viewBox="0 0 8 4" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M0.5 3C1.5 1 2.5 1 3.5 2C4.5 3 5.5 3 6.5 1.5C7 1 7.5 1 7.5 1" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
