<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* Status */
    --green:    #70D26E;
    --red:      #FA6060;

    /* Typography */
    --text-primary:   #000000;
    --text-secondary: #353535;
    --text-tertiary:  #6A6A6A;

    /* Surfaces */
    --surface-bg:   #F1F0ED;
    --tile-bg:      #FAF9F6;
    --row-border:   #E5E3DE;
  }

  body {
    width: 1200px;
    height: 630px;
    background: var(--surface-bg);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .card {
    height: 100%;
    padding: 48px 56px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    gap: 24px;
    align-items: stretch;
  }

  .header-left {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .ft-badge {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ft-badge svg { width: 38px; height: 38px; }

  .header-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .record-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 44px;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
  }
  .record-region {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .header-right {
    flex-shrink: 0;
    background: var(--tile-bg);
    border-radius: 8px;
    padding: 20px 28px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 320px;
  }
  .record-set-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    line-height: 22px;
    color: var(--text-primary);
  }
  .record-set-date {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 400;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  .record-value-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-top: 4px;
  }
  .record-value {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    line-height: 52px;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .record-unit {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-tertiary);
  }
  .record-change {
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .record-change.up   { color: var(--green); }
  .record-change.down { color: var(--red); }
  .record-change.flat { color: var(--text-tertiary); }

  /* ---- Sparkline ---- */
  .sparkline-wrap {
    flex: 1 1 auto;
    background: var(--tile-bg);
    border-radius: 8px;
    padding: 22px 28px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .sparkline-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .sparkline-meta .period {
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }
  .sparkline-svg {
    flex: 1 1 auto;
    width: 100%;
    display: block;
  }

  /* ---- Description ---- */
  .record-description {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 30px;
    color: var(--text-secondary);
    flex-shrink: 0;
    padding: 0 4px;
  }

  /* ---- Footer ---- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--row-border);
    flex-shrink: 0;
  }
  .footer-source {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text-tertiary);
  }
  .footer-logo {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    color: var(--text-primary);
  }
  .footer-logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .footer-logo-mark { width: 18px; height: 9px; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="ft-badge" style="background-color: ${ft_color}; color: ${icon_color};">
        ${icon_svg}
      </div>
      <div class="header-title-wrap">
        <div class="record-title">${title}</div>
        % if region:
        <div class="record-region">${region}</div>
        % endif
      </div>
    </div>

    <div class="header-right">
      <div class="record-set-label">Record set</div>
      <div class="record-set-date">${set_date}</div>
      <div class="record-value-row">
        <span class="record-value">${value_str}</span>
        % if unit_str:
        <span class="record-unit">${unit_str}</span>
        % endif
      </div>
      % if change_str:
      <div class="record-change ${change_class}">${change_str}</div>
      % endif
    </div>
  </div>

  <!-- Sparkline -->
  <div class="sparkline-wrap">
    <div class="sparkline-meta">
      <span>${history_label}</span>
      <span class="period">${period_label}</span>
    </div>
    ${sparkline_svg}
  </div>

  <!-- Description -->
  <div class="record-description">${description}</div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-source">Source: AEMO / Open Electricity</span>
    <div class="footer-logo">
      <span class="footer-logo-text">Open Electricity</span>
      <svg class="footer-logo-mark" viewBox="0 0 8 4" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M0.5 3C1.5 1 2.5 1 3.5 2C4.5 3 5.5 3 6.5 1.5C7 1 7.5 1 7.5 1" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
