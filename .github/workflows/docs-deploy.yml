name: Docs Deploy

# Branch -> environment mapping (direct-upload via wrangler, CI-driven):
#   push main       -> openelectricity-docs       (production deploy = docs.oedev.org),            dev OpenAPI
#   push production -> openelectricity-docs-prod   (production deploy = docs.openelectricity.org.au), prod OpenAPI
# PR previews are handled separately by docs-preview.yml.

on:
  push:
    branches: [main, production]
    paths:
      - 'docs/**'

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy docs to dev (docs.oedev.org)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Validate docs
        working-directory: docs
        run: bun run check

      - name: Build docs (dev OpenAPI)
        working-directory: docs
        env:
          TANGLY_OPENAPI_URL: https://api.oedev.org/openapi.json
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: >-
            pages deploy dist
            --project-name openelectricity-docs
            --branch main

  deploy-prod:
    name: Deploy docs to prod (docs.openelectricity.org.au)
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    # docs-production environment gates this with a required-reviewer approval
    # and restricts deploys to the production branch.
    environment: docs-production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Validate docs
        working-directory: docs
        run: bun run check

      - name: Build docs (prod OpenAPI from docs.json default)
        working-directory: docs
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: >-
            pages deploy dist
            --project-name openelectricity-docs-prod
            --branch production
